<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Taxi Dashboard</title>

<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../admin.css">
</head>

<body>

<div id="admin-dashboard">

  <div class="container">

    <div class="dashboard-stats">
      <div class="stat-card">
        <div class="stat-card-num" id="stat-total">0</div>
        <div class="stat-card-label">Total Bookings</div>
      </div>

      <div class="stat-card">
        <div class="stat-card-num" id="stat-confirmed">0</div>
        <div class="stat-card-label">Confirmed</div>
      </div>

      <div class="stat-card">
        <div class="stat-card-num" id="stat-pending">0</div>
        <div class="stat-card-label">Pending</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <tr>
  <th>ID</th>
  <th>Customer</th>
  <th>Phone</th>
  <th>Route</th>
  <th>Date & Time</th>
  <th>Vehicle</th>
  <th>Status</th>
  <th>Actions</th>
            </tr>
          </tr>
        </thead>

        <tbody id="bookings-tbody">
        </tbody>

      </table>
    </div>

  </div>

</div>

<script src="../config.js"></script>
<script src="../admin.js"></script>

</body>
</html>
<script src="../config.js"></script>
<script src="../admin.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

  allBookings = getSampleBookings();

  renderStats();

  renderBookingsTable(allBookings);

});
</script>
